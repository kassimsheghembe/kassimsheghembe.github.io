<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <script>!function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}()</script>
  <meta content='text/html; charset=utf-8' http-equiv='Content-Type'>
  <meta name="google-site-verification" content="BqCcpS_2Iksg5kBpLCbkMa0PefMLfYHi_GPOu13xB4s" />
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta name="keywords"
    content="Kassim Sheghembe, Software Engineer, AWS, Flink, FHIR, NiFi, Data Engineer, Tanzania, Full Stack Developer">

  {% seo %}

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}"
    href="{{ site.baseurl }}/feed.xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/plugins/font-awesome/css/fontawesome.min.css">
  <link href="/assets/plugins/font-awesome/css/brands.css" rel="stylesheet">
  <link href="/assets/plugins/font-awesome/css/solid.css" rel="stylesheet">
  <link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico" type="image/x-icon">

  <!-- Structured Data: ProfilePage + Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfilePage",
    "mainEntity": {
      "@type": "Person",
      "name": "{{ site.name }}",
      "url": "{{ site.url }}",
      "jobTitle": "Software Engineer",
      "description": "{{ site.description }}",
      "email": "{{ site.author.email }}",
      "sameAs": [
        {% for link in site.social.links %}"{{ link }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    }
  }
  </script>

  <!-- Structured Data: WebSite (enables sitelinks search) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.name }}",
    "url": "{{ site.url }}",
    "description": "{{ site.description }}"
  }
  </script>
</head>

<body class="index-body">
  <div class="wrapper-masthead">
    <div class="container-wide">
      <header class="masthead clearfix">
        <div class="row align-items-center position-relative">
          <div class="col-5">
            <div class="site-logo">
              <a class="navbar-brand" href="{{site.url}}/">
                {{ site.name }}
              </a>
              <p>{{ site.subtitle }}</p>
            </div>
          </div>
          <div class="col-7">
            <nav class="navbar navbar-expand-lg navbar-light" aria-label="Main navigation">
              <ul class="nav-menu">{% include navigation.html %}</ul>
              <button class="theme-toggle" id="theme-toggle-home" aria-label="Switch to dark mode"><i class="fas fa-moon"></i></button>
              <button class="hamburger" type="button" aria-label="Toggle navigation menu" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
              </button>
            </nav>
          </div>
        </div>
      </header>
    </div>
  </div>

  <main>
    {{ content }}
  </main>

  <div class="wrapper-footer">
    <div class="container-wide">
      <div class="footer clearfix">
        {% include footer.html %}
      </div>
    </div>
  </div>

  {% include scripts.html %}
</body>

</html>
