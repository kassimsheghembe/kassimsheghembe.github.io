  fast-chat-ai:
    id: "fast-chat-ai"
    title: "Fast Chat AI - RAG Chatbot"
    tagline: "Intelligent document-grounded chatbot with multi-LLM support"
    description: "A Retrieval-Augmented Generation (RAG) chatbot application that lets users upload documents and engage in intelligent conversations grounded in their specific knowledge base. Features multi-LLM provider support, vector search, and hybrid conversation memory."
    long_description: |
      Fast Chat AI is a full-stack RAG chatbot that enables users to upload documents (PDF, TXT, DOCX, Markdown) and have intelligent conversations
      grounded in their specific knowledge base. The application uses vector embeddings stored in PostgreSQL with pgvector for semantic search,
      ensuring responses are accurate and contextually relevant.

      The system supports multiple LLM providers (OpenAI, Anthropic, Google AI) with automatic failover and cost-optimized provider selection.
      Conversation memory uses a hybrid Redis + PostgreSQL architecture with auto-summarization to maintain context across long conversations.

      The application features multi-tenant environment management with isolated knowledge bases, role-based access control,
      and a modern React frontend with TypeScript and Tailwind CSS.
