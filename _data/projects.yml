  smart-bridge:
    id: "smart-bridge"
    title: "Smart Bridge Interoperability Solution"
    tagline: "Hub-and-spoke bridge connecting legacy health systems with FHIR"
    description: "A hub-and-spoke interoperability solution connecting legacy health systems (UCS and GoTHOMIS) with modern FHIR-based ecosystems using OpenHIM as the central routing and transformation engine."
    long_description: |
      Smart Bridge is an enterprise healthcare interoperability platform that bridges legacy health information systems with modern FHIR-based
      ecosystems. Built as a Maven multi-module Spring Boot application, it uses OpenHIM as the central mediator for routing, orchestrating,
      and transforming health data between disparate systems.

      The system connects UCS (Unified Community System) and GoTHOMIS (Government of Tanzania Health Operations Management Information System)
      with FHIR R4 compliant services. It features comprehensive data transformation between UCS data models and FHIR resources,
      audit logging for compliance, and Prometheus-based monitoring with custom healthcare metrics.

      The modular architecture separates core data models, transformation logic, OpenHIM mediators, and the main application
      into independent Maven modules for maintainability and testability.
    technologies: ["Java", "Spring Boot", "HAPI FHIR", "OpenHIM", "FHIR", "Maven"]
    category: "infrastructure"
    year: 2026
    status: "in-progress"
    featured: false
    featured_image: null
    gallery: []
