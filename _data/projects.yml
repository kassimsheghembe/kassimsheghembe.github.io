    metrics:
      users: null
      performance: "Full MongoDB 5.0.24 server on ARM64 single-board computers"
      impact: "Enables MongoDB deployments on Orange Pi and similar ARM64 devices"
    challenges:
      - problem: "MongoDB does not provide official ARM64 builds for single-board computers"
        solution: "Cross-compiled MongoDB 5.0.24 from source targeting AArch64 architecture with dynamic glibc linking"
        technologies_used: ["MongoDB Source", "ARM64 Toolchain", "Linux"]
      - problem: "OpenSSL 1.1 dependency not available on newer Ubuntu versions"
        solution: "Documented compatibility requirements and provided installation instructions for OpenSSL 1.1 compatibility packages"
        technologies_used: ["OpenSSL", "Package Management"]

