        alt: "NCD FHIR App Main Screen"
        caption: "Main screen showing patient list overview and quick actions"
      - src: "/images/projects/ncd-fhir-app/patient-search-screen.png"
        alt: "Search Patient Screen"
        caption: "Search for registred patient using names"
      - src: "/images/projects/ncd-fhir-app/patient-profile-screen.jpg"
        alt: "Patient Profile Screen"
        caption: "Shows demographic details of a patient"
      - src: "/images/projects/ncd-fhir-app/screening-workflow.jpg"
        alt: "NCD Screening Workflow"
        caption: "Step-by-step diabetes and hypertension screening process"
      - src: "/images/projects/ncd-fhir-app/offline-sync.jpg"
        alt: "Offline Synchronization"
        caption: "Offline-first architecture with intelligent data synchronization"
    links:
