      users: null
      performance: "Real-time data transformation between legacy and FHIR systems"
      impact: "Enables interoperability between Tanzania's legacy health systems and modern FHIR ecosystems"
    challenges:
      - problem: "Legacy health systems use proprietary data formats incompatible with modern standards"
        solution: "Built a transformation layer that maps UCS data models (identifiers, demographics, clinical data) to FHIR R4 resources using HAPI FHIR"
        technologies_used: ["HAPI FHIR", "Java", "Data Mapping"]
      - problem: "Routing health data between multiple systems with different protocols and endpoints"
        solution: "Used OpenHIM as the central interoperability layer with custom mediators for each system, handling routing, orchestration, and error recovery"
        technologies_used: ["OpenHIM", "Spring Boot", "Mediator Pattern"]
      - problem: "Ensuring compliance and traceability for all health data exchanges"
        solution: "Implemented multi-tier audit logging with 365-day retention for compliance and security events, plus Prometheus metrics for real-time monitoring"
        technologies_used: ["Logback", "Micrometer", "Prometheus"]

  mongodb-orangepi-binaries:
    id: "mongodb-orangepi-binaries"
    title: "MongoDB 5.0 for Orange Pi (ARM64)"
    tagline: "Precompiled MongoDB server binary for ARM64 single-board computers"
    description: "Unofficial precompiled MongoDB 5.0.24 runtime binary for Orange Pi and other ARM64 (AArch64) Linux devices, enabling MongoDB on resource-constrained single-board computers."
    long_description: |
      This project provides a precompiled MongoDB 5.0.24 server binary for Orange Pi devices running ARM64 Linux.
      MongoDB does not officially distribute ARM64 builds for single-board computers, so this community build fills that gap
      by cross-compiling mongod for AArch64 architecture.

      The binary is a dynamically linked ELF 64-bit executable built against OpenSSL 1.1 and glibc, compatible with
      Ubuntu 20.04/22.04 and Debian 11 (bullseye) on ARM64. It has been tested and verified on Orange Pi hardware
      with kernel version 3.7 and above.

      The distribution includes only the mongod server binary, keeping the package lightweight and focused
      for embedded and IoT deployment scenarios.
    technologies: ["MongoDB", "Linux"]
    category: "infrastructure"
    year: 2025
    status: "completed"
    featured: false
    featured_image: null
